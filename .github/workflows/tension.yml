name: initiate

on:
  push:

jobs:
  approval:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        volunteer: ["manufacture", "packet", "feasible", "profile", "charm"]
        museum: ["rental", "nowhere", "lawyer", "geographic"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar MF.jar
